# Batch Java Backporting Configuration

# CSV File Configuration
csv_file: java_dataset/all_projects_final.csv

# Row Range
start_row: 15           # 0-indexed
end_row: 17            # Exclusive (will process rows 0-9)

# Paths
java_dataset_dir: java_dataset/repos/
java_results_dir: java_results/

# LLM Provider Selection
# Options: "openai", "azure", "openrouter"
provider: "openrouter"

# OpenAI Configuration (for provider: openai)
# openai_key: "sk-..."
# openai_model: "gpt-4-turbo"

# OpenRouter Configuration (for provider: openrouter)
openai_key: "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"  # Your OpenRouter API key
openai_model: "openai/gpt-4.1-mini"  # or specify model like "meta-llama/llama-2-70b-chat"
openai_base_url: "https://openrouter.ai/api/v1"

# Azure OpenAI Configuration (for provider: azure)
# azure_endpoint: "https://apim-ai-aus.openai.azure.com"
# azure_deployment: "gpt-4.1-mini"
# azure_api_version: "2024-02-01"
# openai_key: "your-azure-key"

# Backporting tool source
backport_script: src/backporting.py
